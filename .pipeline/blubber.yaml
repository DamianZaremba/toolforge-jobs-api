# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.8.0
version: v4
base: docker-registry.wikimedia.org/python3-trixie:latest
variants:
  image:
    apt:
      packages:
        - libnss-sss
    lives:
      in: /app
    builders:
      - custom:
          command:
            - mkdir
            - -p
            - prometheus-multiproc
      - python:
          version: python3
          poetry:
            version: ==2.4.1
            without: dev
          requirements:
            - pyproject.toml
            - poetry.lock
    runs:
      # needed to read k8s credentials from tool home dirs
      insecurely: true
      environment:
        PROMETHEUS_MULTIPROC_DIR: "/app/prometheus-multiproc"
        PORT: "8000"
        ADDRESS: "127.0.0.1"
    copies:
      - local
    entrypoint:
      - poetry
      - run
      - uvicorn
      - --factory
      - tjf.api.app:create_app
      - --workers=4
